steps:
  # 1. Map Docker Image compilation natively
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/xstadium-backend:$COMMIT_SHA', './backend']
    id: 'build-backend'

  # 2. Push Image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/xstadium-backend:$COMMIT_SHA']
    id: 'push-backend'

  # 3. Deploy instantly to Cloud Run natively
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'xstadium-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/xstadium-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--port'
      - '3001'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-cloud-run'

  # 4. Install Frontend UI Packages
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    dir: 'frontend'
    id: 'install-frontend'

  # 5. Build React Application payload natively
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'frontend'
    id: 'build-frontend'
    env:
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - 'VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - 'VITE_API_BASE_URL=$_VITE_API_BASE_URL'
      - 'VITE_GOOGLE_MAPS_API_KEY=$_VITE_GOOGLE_MAPS_API_KEY'

  # 6. Deploy UI artifacts strictly to Firebase Hosting CDN
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--project=$PROJECT_ID', '--only=hosting']
    id: 'deploy-hosting'

images:
  - 'gcr.io/$PROJECT_ID/xstadium-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
