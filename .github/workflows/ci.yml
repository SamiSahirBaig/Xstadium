name: Xstadium CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Frontend Dependencies
        run: npm ci

      - name: Execute Linter Array
        run: npm run lint

      - name: Build Application Payload
        # Mapping fake environment variables natively passing Vite build constraints
        env:
          VITE_FIREBASE_API_KEY: "dummy"
          VITE_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "dummy"
          VITE_API_BASE_URL: "http://localhost:3001"
          VITE_GOOGLE_MAPS_API_KEY: "dummy"
        run: npm run build

  build-backend:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install Backend Dependencies
        run: npm ci

      - name: Execute Linter Array
        run: npm run lint
